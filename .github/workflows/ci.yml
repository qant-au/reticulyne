name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Audit production dependencies
        # Fail CI on any moderate-or-higher advisory in the production
        # dependency graph. Low-severity advisories are reported by
        # `npm audit` but allowed through the gate; the accepted set is
        # listed in SECURITY.md and must be re-audited there before any
        # new low-severity entry is allowed to land.
        #
        # `--omit=dev` excludes devDependencies so a transitive jest /
        # webpack-dev-server advisory doesn't block the build — those
        # are tracked separately in SECURITY.md.
        run: npm audit --omit=dev --audit-level=moderate

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Verify pack contents
        # Assert the published tarball only contains expected top-level
        # paths. A drifted `files` field or a `tsconfig.build.json`
        # exclude regression would otherwise silently ship test
        # fixtures, vendor code, or example components.
        run: |
          npm pack --dry-run --json > pack-report.json
          node -e "
            const r = JSON.parse(require('fs').readFileSync('pack-report.json', 'utf8'));
            const files = (r[0]?.files ?? []).map((f) => f.path);
            const allowedTop = new Set(['dist', 'README.md', 'LICENSE', 'package.json']);
            const offenders = files.filter((p) => !allowedTop.has(p.split('/')[0]));
            if (offenders.length) {
              console.error('Unexpected files in published tarball:');
              offenders.forEach((f) => console.error('  ' + f));
              process.exit(1);
            }
            console.log('pack contents OK — ' + files.length + ' files, all under allowed roots');
          "

  # End-to-end (Playwright) — label-gated.
  #
  # Runs only when the triggering commit message (push) or PR title
  # (pull_request) contains the literal string `[run e2e]`. The intent
  # is opt-in: most PRs don't touch the editor's interactive surface,
  # so paying ~3 minutes per run is reserved for the changes that do.
  # The job builds the reticulyne Docker image, starts it on the runner,
  # and points Playwright at it.
  e2e:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[run e2e]')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, '[run e2e]'))
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build reticulyne Docker image
        run: docker build -t reticulyne .

      - name: Start reticulyne container
        run: |
          docker run -d --rm --name reticulyne -p 2222:8080 reticulyne
          for i in $(seq 1 30); do
            if curl -sf http://localhost:2222/ > /dev/null; then
              echo "reticulyne container responding on :2222"
              exit 0
            fi
            sleep 1
          done
          echo "reticulyne container did not respond within 30s" >&2
          docker logs reticulyne >&2 || true
          exit 1

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:2222

      - name: Stop reticulyne container
        if: always()
        run: docker rm -f reticulyne || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            playwright-out/
          retention-days: 7
