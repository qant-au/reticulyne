server {
    # 8080 (not 80) because the nginx-unprivileged base image runs nginx
    # as the unprivileged `nginx` user, which cannot bind privileged
    # ports. Containers expose 8080 and the host port mapping in
    # restart.sh maps the public 2222/2223 down to 8080 inside.
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version in headers / error pages.
    server_tokens off;

    # Disable directory listing.
    autoindex off;

    # ----- Compression -----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ----- Security headers -----
    # Applied via add_header so they appear on every response from this server.
    add_header X-Content-Type-Options "nosniff" always;
    # HSTS (SEC-07). Assumes HTTPS-only ingress — the image is intended to run
    # behind a TLS-terminating reverse proxy. Forces the browser to use HTTPS
    # for two years, closing the first-request downgrade window. Re-applied in
    # the location blocks below because add_header is replaced, not merged.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # Modern browsers honour CSP `frame-ancestors` (set below); X-Frame-Options
    # is the legacy fallback for older browsers (IE, pre-15.4 Safari).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    # CSP allows: self for app code; unsafe-inline styles for emotion/MUI's
    # injected style tags; Google Fonts (CSS + WOFF) used by the standalone
    # editor; data: + blob: img for in-bundle inlined SVGs and the
    # export-to-PNG path. No third-party image origins are permitted —
    # embedders shipping their own collections must self-host or use
    # data:/blob: URIs.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # ----- Cache headers -----
    # Hashed asset bundles are immutable; the entrypoint is not.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Re-apply the security headers (add_header is replaced inside a
        # location block, not merged).
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    # ----- SPA fallback -----
    # Any client-side route that doesn't map to a file returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
